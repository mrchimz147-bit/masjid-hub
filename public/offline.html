<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Masjid Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1B5E20 0%, #0D3A12 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      color: white;
      max-width: 400px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.8;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .mosque-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
    }
    button {
      background: #D4AF37;
      color: #1A1A1A;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .dua {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
    }
    .dua-arabic {
      font-size: 20px;
      direction: rtl;
      margin-bottom: 10px;
    }
    .dua-translation {
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="mosque-icon" viewBox="0 0 64 64" fill="none">
      <path d="M32 4C26 4 22 8 22 14C22 16 23 18 24 20H18V26H12V56H52V26H46V20H40C41 18 42 16 42 14C42 8 38 4 32 4Z" fill="#D4AF37" stroke="#1B5E20" stroke-width="2"/>
      <rect x="28" y="30" width="8" height="26" fill="#1B5E20"/>
      <circle cx="32" cy="14" r="3" fill="#1B5E20"/>
      <rect x="8" y="50" width="48" height="6" fill="#1B5E20"/>
    </svg>
    
    <h1>📡 You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
    
    <button onclick="window.location.reload()">🔄 Try Again</button>
    
    <div class="dua">
      <p class="dua-arabic">اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ</p>
      <p class="dua-translation">O Allah, I seek refuge in You from worry and grief</p>
    </div>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
